<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pratica con il Grid System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
<header><h1 class="text-center">Pratica con il Grid System</h1></header>
<main>
    <section class="container" >
    <h2 class="text-center">Esercizio 1</h2>
    <article class="row bg-primary">
        <div class="col-md-4 text-white  p-3 border border-dark text-center ">1</div>
        <div class="col-md-4 text-white  p-3 border border-dark text-center ">2</div>
        <div class="col-md-4 text-white  p-3 border border-dark text-center ">3</div>
    </article>
</section>
<section class="container">
    <h2 class="text-center">Esercizio 2</h2>
    <article class="row bg-warning
">
        <div class="col-lg-4 text-black  p-3 border border-dark text-center">1</div>
        <div class="col-lg-4 text-black  p-3 border border-dark text-center ">2</div>
        <div class="col-lg-4 text-black  p-3 border border-dark text-center ">3</div>
    </article>
</section>
<section class="container">
    <h2 class="text-center">Esercizio 3</h2>
    <article class="row bg-success text-white">
        <div class="col-4 border border-dark p-3 text-center">1</div>
        <div class="col-4 border border-dark p-3 text-center">2</div>
        <div class="col-4 border border-dark p-3 text-center">3</div>
    </article>
    <article class="row bg-success text-white">
        <div class="col-sm-4 border border-dark p-3 text-center">1</div>
        <div class="col-sm-4 border border-dark p-3 text-center">2</div>
        <div class="col-sm-4 border border-dark p-3 text-center">3</div>
    </article>
    <article class="row bg-success text-white">
        <div class="col-md-4 border border-dark p-3 text-center">1</div>
        <div class="col-md-4 border border-dark p-3 text-center">2</div>
        <div class="col-md-4 border border-dark p-3 text-center">3</div>
    </article>
    <article class="row bg-success text-white">
        <div class="col-lg-4 border border-dark p-3 text-center">1</div>
        <div class="col-lg-4 border border-dark p-3 text-center">2</div>
        <div class="col-lg-4 border border-dark p-3 text-center">3</div>
    </article>
    <article class="row bg-success text-white">
        <div class="col-xl-4 border border-dark p-3 text-center">1</div>
        <div class="col-xl-4 border border-dark p-3 text-center">2</div>
        <div class="col-xl-4 border border-dark p-3 text-center">3</div>
    </article>
    <article class="row bg-success text-white">
        <div class="col-xxl-4 border border-dark p-3 text-center">1</div>
        <div class="col-xxl-4 border border-dark p-3 text-center">2</div>
        <div class="col-xxl-4 border border-dark p-3 text-center">3</div>
    </article>
</section>
<section class="container">
    <h2 class="text-center">Esercizio 4</h2>
    <article class="row bg-danger text-white">
        <div class="col-lg-3 p-3 border border-dark text-center">1</div>
        <div class="col-lg-6 p-3 border border-dark text-center">2</div>
        <div class="col-lg-3 p-3 border border-dark text-center">3</div>
    </article>
</section>
<section class="container">
    <h2 class="text-center">Esercizio 5</h2>
    <article class="row text-white text-center bg-info">
        <div class="col-lg-8 border border-dark p-3">1
            <div class="row">
                <div class="col-6 bg-secondary">1b</div>
                <div class="col-6 bg-secondary">2b</div>
            </div>
        </div>
        <div class="col-lg-4 border border-dark p-3">2</div>
    </article>
</section>
</main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
